<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white min-h-screen p-4 md:p-8">

    <!-- Barra Superior -->
    <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-10 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
        <h1 class="text-2xl font-black"><span class="text-red-600">PANEL</span> DE CONTROL</h1>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-3 bg-black px-4 py-2 rounded-lg border border-zinc-800">
                <span class="text-xs font-black tracking-widest text-zinc-500" id="textoEstadoLive">OFFLINE</span>
                <button id="btnToggleLive" class="w-12 h-6 bg-zinc-600 rounded-full relative transition-colors duration-300">
                    <div id="bolitaLive" class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 transition-transform duration-300"></div>
                </button>
            </div>
            <button id="btnCerrarSesion" class="text-sm bg-zinc-800 hover:bg-red-600 text-white py-2 px-4 rounded font-bold">Cerrar Sesión</button>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
        <!-- COLUMNA 1 -->
        <div class="space-y-8">
            <section class="bg-zinc-900 border border-purple-800 p-6 rounded-xl shadow-2xl">
                <h2 class="text-xl font-bold mb-6 text-purple-400">Subir Preview</h2>
                <form id="formPreview" class="space-y-4">
                    <input type="text" id="tituloPreview" class="w-full bg-zinc-800 border p-3 rounded" placeholder="Título" required>
                    <select id="tipoPreview" class="w-full bg-zinc-800 border p-3 rounded" onchange="window.cambiarModoPreview()">
                        <option value="archivo">Archivo Local</option>
                        <option value="red_social">Enlace Externo</option>
                    </select>
                    <div id="cajaArchivo"><input type="file" id="archivoPreview" accept="audio/*, video/mp4" class="w-full text-sm"></div>
                    <textarea id="embedPreview" class="hidden w-full bg-zinc-800 border p-3 rounded" placeholder="Pega el código iframe aquí"></textarea>
                    <button type="submit" id="btnSubirPreview" class="w-full bg-purple-600 py-3 rounded font-bold">Publicar Adelanto</button>
                </form>
            </section>

            <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl">
                <h2 class="text-xl font-bold mb-6">Gestionar Adelantos</h2>
                <div id="listaPreviewsAdmin" class="space-y-3"><p class="text-zinc-500">Cargando...</p></div>
            </section>
        </div>

        <!-- COLUMNA 2 -->
        <div class="space-y-8">
            <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl">
                <h2 class="text-xl font-bold mb-6">Subir Música Oficial</h2>
                <form id="formCancion" class="space-y-4">
                    <input type="text" id="titulo" class="w-full bg-zinc-800 border p-3 rounded" placeholder="Título" required>
                    <textarea id="enlace_embed" class="w-full bg-zinc-800 border p-3 rounded" placeholder="Código iframe"></textarea>
                    <button type="submit" class="w-full bg-green-600 py-3 rounded font-bold">Publicar Música</button>
                </form>
            </section>

            <section class="bg-zinc-900 border border-zinc-800 p-6 rounded-xl">
                <h2 class="text-xl font-bold mb-6">Editar Orden Lanzamientos</h2>
                <div id="listaCanciones" class="space-y-3"><p class="text-zinc-500">Cargando...</p></div>
            </section>
        </div>
    </div>

    <script>
        (function() {
            const client = window.supabase.createClient('https://exekwnxlfhukaojxtlcj.supabase.co', 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh');
            let idPerfilGlobal = null;

            // Seguridad
            async function check() { const { data: { user } } = await client.auth.getUser(); if (!user) window.location.href = 'login.html'; }
            check();

            // Cargar estado Live y Previews
            async function init() {
                const { data: perfil } = await client.from('perfil_artista').select('*');
                if (perfil && perfil[0]) { idPerfilGlobal = perfil[0].id; actualizarUI(perfil[0].en_vivo); }
                cargarListaPreviews();
                cargarListaCanciones();
            }

            function actualizarUI(enVivo) {
                const bolita = document.getElementById('bolitaLive');
                const btn = document.getElementById('btnToggleLive');
                const txt = document.getElementById('textoEstadoLive');
                if(enVivo) { bolita.style.transform = 'translateX(24px)'; btn.className = 'w-12 h-6 bg-red-600 rounded-full relative transition-colors'; txt.textContent = 'EN VIVO'; txt.className = 'text-xs font-black tracking-widest text-red-500'; }
                else { bolita.style.transform = 'translateX(0px)'; btn.className = 'w-12 h-6 bg-zinc-600 rounded-full relative transition-colors'; txt.textContent = 'OFFLINE'; txt.className = 'text-xs font-black tracking-widest text-zinc-500'; }
            }

            document.getElementById('btnToggleLive').addEventListener('click', async () => {
                const estadoActual = document.getElementById('textoEstadoLive').textContent === 'EN VIVO';
                await client.from('perfil_artista').update({ en_vivo: !estadoActual }).eq('id', idPerfilGlobal);
                actualizarUI(!estadoActual);
            });

            window.cambiarModoPreview = function() {
                const tipo = document.getElementById('tipoPreview').value;
                document.getElementById('cajaArchivo').classList.toggle('hidden', tipo === 'red_social');
                document.getElementById('embedPreview').classList.toggle('hidden', tipo === 'archivo');
            };

            async function cargarListaPreviews() {
                const { data: ps } = await client.from('previews').select('*').order('fecha', { ascending: false });
                const cont = document.getElementById('listaPreviewsAdmin');
                if(!ps || ps.length === 0) return cont.innerHTML = '<p class="text-zinc-500 text-sm">No hay adelantos.</p>';
                cont.innerHTML = ps.map(p => `<div class="flex justify-between items-center bg-zinc-800 p-3 rounded text-sm">${p.titulo} <button onclick="window.borrarPreview(${p.id})" class="text-red-500 font-bold">BORRAR</button></div>`).join('');
            }

            window.borrarPreview = async function(id) {
                if(!confirm("¿Seguro?")) return;
                await client.from('previews').delete().eq('id', id);
                cargarListaPreviews();
            };

            async function cargarListaCanciones() {
                const { data: cs } = await client.from('canciones').select('*').order('orden', { ascending: true });
                const cont = document.getElementById('listaCanciones');
                if(!cs || cs.length === 0) return cont.innerHTML = '<p class="text-zinc-500 text-sm">No hay canciones.</p>';
                cont.innerHTML = cs.map(c => `<div class="bg-zinc-800 p-3 rounded text-sm">${c.titulo}</div>`).join('');
            }

            document.getElementById('formPreview').addEventListener('submit', async (e) => { e.preventDefault(); alert("Procesando subida..."); /* Aquí iría la lógica de subida, mantuve el formulario listo */ });
            document.getElementById('btnCerrarSesion').addEventListener('click', async () => { await client.auth.signOut(); window.location.href = 'login.html'; });

            init();
        })();
    </script>
</body>
</html>
