<script>
        // Usamos una función autoejecutable para que las variables no choquen
        (function() {
            const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
            const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
            
            // Si supabase ya existe, no intentamos crearlo de nuevo
            window.miSupabase = window.miSupabase || window.supabase.createClient(supabaseUrl, supabaseKey);
            const client = window.miSupabase;

            async function cargarTodo() {
                try {
                    // Perfil
                    const { data: perfil } = await client.from('perfil_artista').select('*');
                    if (perfil && perfil[0]) {
                        document.getElementById('nombre-artista').innerText = perfil[0].nombre;
                        document.getElementById('bio-artista').innerText = perfil[0].biografia;
                    }

                    // Canciones
                    const { data: canciones } = await client.from('canciones').select('*');
                    document.getElementById('contenedor-canciones').innerHTML = (canciones || []).map(c => `<div>${c.enlace_embed}</div>`).join('');

                    // Eventos
                    const { data: eventos } = await client.from('eventos').select('*');
                    document.getElementById('contenedor-eventos').innerHTML = (eventos || []).map(e => `
                        <div class="bg-zinc-800 p-4 rounded-lg">
                            <p class="font-bold text-green-400">${e.fecha}</p>
                            <p class="text-sm">${e.lugar} - ${e.ciudad}</p>
                        </div>
                    `).join('');

                    // Noticias
                    cargarNoticias(client);
                } catch (e) { console.error("Error al cargar datos:", e); }
            }

            async function cargarNoticias(client) {
                const { data: posts } = await client.from('posts').select('*').order('fecha', { ascending: false });
                const { data: coms } = await client.from('comentariospost').select('*');
                
                const contNoticias = document.getElementById('contenedor-noticias');
                if(!posts || posts.length === 0) { contNoticias.innerHTML = '<p class="text-zinc-500">No hay noticias.</p>'; return; }
                
                contNoticias.innerHTML = posts.map(p => `
                    <div class="bg-zinc-900 p-6 rounded-lg mb-8 border border-zinc-800">
                        <h3 class="text-xl font-bold">${p.titulo}</h3>
                        <p class="text-sm text-zinc-400 mb-4">${p.contenido}</p>
                        <div class="space-y-2">
                            ${(coms || []).filter(c => c.post_id === p.id).map(c => `<p class="text-xs bg-zinc-800 p-2 rounded"><b>${c.autor}:</b> ${c.mensaje}</p>`).join('')}
                        </div>
                    </div>
                `).join('');
            }

            cargarTodo();
        })();
    </script>
