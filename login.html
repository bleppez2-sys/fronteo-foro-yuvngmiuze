<!-- Conexión a prueba de balas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const laUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const laLlave = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        
        // Cambiamos el nombre a "clienteDB" para evadir el error fantasma de GitHub
        const clienteDB = window.supabase.createClient(laUrl, laLlave);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btnText = document.querySelector('button span');
            
            btnText.textContent = "Verificando...";
            errorMsg.classList.add('hidden');

            const { data, error } = await clienteDB.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.classList.remove('hidden');
                btnText.textContent = "Ingresar al Panel";
            } else {
                btnText.textContent = "¡Acceso Concedido!";
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            }
        });
    </script>
</body>
</html>
