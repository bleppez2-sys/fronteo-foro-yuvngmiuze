<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Artista | Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#121212] text-white h-screen flex items-center justify-center p-4">
    <div class="bg-zinc-900 p-8 rounded-xl border border-zinc-800 shadow-2xl max-w-md w-full text-center">
        <h1 class="text-3xl font-black mb-2">Acceso <span class="text-red-600">Artista</span></h1>
        <p class="text-zinc-500 text-sm mb-8">Solo personal autorizado.</p>
        <form id="formLogin" class="space-y-4">
            <input type="email" id="email" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded p-3 focus:outline-none focus:border-red-600" placeholder="Correo Electrónico" required>
            <input type="password" id="password" class="w-full bg-zinc-800 border border-zinc-700 text-white rounded p-3 focus:outline-none focus:border-red-600" placeholder="Contraseña" required>
            <button type="submit" id="btnAcceder" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded transition-colors">Ingresar al Panel</button>
        </form>
        <a href="index.html" class="inline-block mt-6 text-zinc-500 hover:text-white text-sm transition-colors">← Volver al inicio</a>
    </div>
    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnAcceder');
            btn.textContent = "Verificando...";
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert('Error: Credenciales incorrectas.');
                btn.textContent = "Ingresar al Panel";
            } else {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
