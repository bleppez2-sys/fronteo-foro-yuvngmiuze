<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .input-field {
            width: 100%; background: #1c1c1c; border: 1px solid #27272a;
            color: #fff; border-radius: 12px; padding: 14px 16px;
            font-size: 14px; transition: all 0.2s;
        }
        .input-field:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.2); }
        .input-field::placeholder { color: #52525b; }

        .btn-primary {
            width: 100%; background: #7c3aed; color: #fff; font-weight: 700;
            padding: 14px; border-radius: 12px; font-size: 15px;
            transition: all 0.2s; border: none; cursor: pointer;
            box-shadow: 0 0 15px rgba(124,58,237,0.3);
        }
        .btn-primary:hover { background: #6d28d9; transform: translateY(-2px); box-shadow: 0 0 20px rgba(124,58,237,0.5); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: #3f3f46; box-shadow: none; cursor: not-allowed; transform: none; }

        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* Brillo de fondo */
        .hero-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; pointer-events: none;
        }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen flex flex-col items-center justify-center p-4 relative z-0">

    <div class="hero-glow"></div>

    <div class="w-full max-w-sm slide-up">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-block transition-transform hover:scale-105">
                <h1 class="text-3xl font-black tracking-tight">MUSA<span class="text-purple-600">CONNECT</span></h1>
            </a>
            <p class="text-zinc-400 text-sm mt-2">Bienvenido de vuelta a tu ecosistema</p>
        </div>

        <div class="bg-[#141414]/80 backdrop-blur border border-zinc-800 rounded-3xl p-8 shadow-2xl">
            <div class="flex flex-col gap-5">
                <div>
                    <label class="text-xs text-zinc-400 font-bold mb-1.5 block uppercase tracking-wider">Correo electrónico</label>
                    <input type="email" id="login-email" class="input-field" placeholder="tu@correo.com">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 font-bold mb-1.5 block uppercase tracking-wider">Contraseña</label>
                    <input type="password" id="login-password" class="input-field" placeholder="••••••••">
                </div>

                <div id="login-error" class="hidden bg-red-900/30 border border-red-800 text-red-400 text-xs rounded-xl px-4 py-3 text-center transition-all"></div>

                <button id="btn-login" class="btn-primary mt-2" onclick="iniciarSesion()">Ingresar al panel</button>
            </div>
        </div>

        <div class="text-center mt-8 space-y-4">
            <p class="text-zinc-500 text-sm">
                ¿No tienes cuenta? <a href="register.html" class="text-purple-500 hover:text-purple-400 font-bold transition-colors">Crear cuenta gratis</a>
            </p>
            <a href="index.html" class="text-zinc-600 hover:text-zinc-400 text-xs font-bold transition-colors block">← Volver a la portada</a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Verificar si ya hay una sesión activa
        async function checkSession() {
            const { data: { session } } = await client.auth.getSession();
            if (session) {
                window.location.href = 'profile.html'; 
            }
        }
        checkSession();

        // Soporte para tecla Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                iniciarSesion();
            }
        });

        async function iniciarSesion() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');

            if (!email || !password) {
                mostrarError('Por favor, completa todos los campos.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Verificando credenciales...';
            errorDiv.classList.add('hidden');

            const { data, error } = await client.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                btn.disabled = false;
                btn.textContent = 'Ingresar al panel';
                if (error.message === 'Invalid login credentials') {
                    mostrarError('Correo o contraseña incorrectos.');
                } else {
                    mostrarError(error.message);
                }
                return;
            }

            // Éxito
            window.location.href = 'profile.html';
        }

        function mostrarError(mensaje) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = mensaje;
            errorDiv.classList.remove('hidden');
            
            // Animación de vibración (shake) en caso de error
            errorDiv.style.transform = 'translateX(5px)';
            setTimeout(() => errorDiv.style.transform = 'translateX(-5px)', 100);
            setTimeout(() => errorDiv.style.transform = 'translateX(5px)', 200);
            setTimeout(() => errorDiv.style.transform = 'translateX(0)', 300);
        }

        window.cerrarSesion = async function() {
            await client.auth.signOut();
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
