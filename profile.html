<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-field {
            width: 100%; background: #1c1c1c; border: 1px solid #27272a;
            color: #fff; border-radius: 8px; padding: 10px 14px; font-size: 13px;
        }
        .input-field:focus { outline: none; border-color: #7c3aed; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        /* Ocultar scrollbar pero permitir scroll */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#121212] text-white min-h-screen pb-20">

    <header class="border-b border-zinc-800/50 bg-[#121212]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="bg-zinc-800/80 hover:bg-zinc-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors border border-zinc-700">← Volver al Menú</a>
            <div class="flex items-center gap-3">
                <a href="feed.html" class="text-zinc-400 hover:text-white text-xs font-bold transition-colors hidden sm:block mr-2">Muro Global</a>
                <a href="editar-perfil.html" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-5 py-2 rounded-full transition-colors">Editar perfil</a>
                <button onclick="cerrarSesion()" class="text-red-500 hover:text-red-400 text-xs font-bold px-3 transition-colors">Salir</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto pt-8 px-4">
        
        <!-- TARJETA DEL PERFIL -->
        <div class="bg-[#141414] border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mb-8">
            <div class="h-32 md:h-48 bg-gradient-to-r from-purple-900/60 to-[#0e0e0e] relative"></div>
            <div class="px-6 md:px-10 pb-8 relative">
                <div id="profile-avatar" class="absolute -top-12 md:-top-16 w-24 h-24 md:w-32 md:h-32 rounded-full bg-zinc-800 border-4 border-[#141414] overflow-hidden flex items-center justify-center text-4xl shadow-xl">
                    <span class="animate-pulse">⏳</span>
                </div>
                <div class="pt-16 md:pt-20 flex flex-col md:flex-row md:justify-between md:items-start gap-4">
                    <div>
                        <h1 id="profile-name" class="text-2xl md:text-4xl font-black tracking-tight">Cargando...</h1>
                        <p id="profile-username" class="text-zinc-500 text-sm font-medium mt-1">@...</p>
                        <span id="profile-role" class="inline-block mt-3 text-[10px] font-black uppercase tracking-wider text-purple-400 bg-purple-900/20 px-2.5 py-1 rounded-md border border-purple-900/50">...</span>
                    </div>
                </div>
                <p id="profile-bio" class="text-zinc-300 text-sm mt-6 border-t border-zinc-800/60 pt-4">Aún no hay biografía configurada.</p>
            </div>
        </div>

        <!-- ZONA DE SUBIDA: FRAGMENTOS Y PREVIEWS -->
        <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6 mb-12">
            <h3 class="text-sm font-black uppercase tracking-widest text-zinc-400 mb-4 text-center">Agregar contenido al portafolio</h3>
            
            <!-- Botones selectores -->
            <div class="flex gap-4 mb-6">
                <button onclick="mostrarPanel('panel-fragmento')" class="flex-1 bg-[#141414] border border-green-900/50 hover:border-green-500 text-green-500 p-4 rounded-xl transition-all font-bold text-sm flex flex-col items-center gap-2 focus:bg-green-900/20">
                    <span class="text-2xl">🎵</span> Fragmento Spotify
                </button>
                <button onclick="mostrarPanel('panel-preview')" class="flex-1 bg-[#141414] border border-purple-900/50 hover:border-purple-500 text-purple-400 p-4 rounded-xl transition-all font-bold text-sm flex flex-col items-center gap-2 focus:bg-purple-900/20">
                    <span class="text-2xl">🎬</span> Preview Video (1 Min)
                </button>
            </div>

            <!-- Panel Fragmento Spotify -->
            <div id="panel-fragmento" class="hidden bg-[#141414] p-5 rounded-xl border border-zinc-800 fade-in">
                <h4 class="text-white font-bold mb-3">Pegar código de Spotify</h4>
                <input type="text" id="input-titulo-cancion" placeholder="Ej: Mi nuevo tema" class="input-field mb-3">
                <input type="text" id="input-embed-cancion" placeholder="Pega aquí el iframe de Spotify" class="input-field mb-4">
                <button id="btn-subir-spotify" onclick="publicarCancion()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors">Publicar Fragmento</button>
            </div>

            <!-- Panel Preview Video -->
            <div id="panel-preview" class="hidden bg-[#141414] p-5 rounded-xl border border-zinc-800 fade-in">
                <h4 class="text-white font-bold mb-3">Subir video (Max 60 segundos)</h4>
                <input type="text" id="input-titulo-preview" placeholder="Ej: Grabando en el estudio..." class="input-field mb-3">
                
                <label class="block w-full border-2 border-dashed border-zinc-700 hover:border-purple-500 rounded-xl p-6 text-center cursor-pointer transition-colors mb-4 bg-zinc-900">
                    <span class="text-3xl mb-2 block">📁</span>
                    <span id="nombre-archivo-video" class="text-zinc-400 text-sm">Toca para elegir un video (MP4)</span>
                    <input type="file" id="input-file-preview" accept="video/mp4, video/webm" class="hidden" onchange="validarVideo(this)">
                </label>

                <div id="alerta-video" class="hidden bg-red-900/30 border border-red-800 text-red-400 text-xs p-3 rounded-lg mb-4 text-center"></div>

                <button id="btn-subir-video" onclick="publicarPreview()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg transition-colors">Subir Preview</button>
            </div>
        </div>

        <!-- ZONA DE EXHIBICIÓN -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <!-- Lanzamientos -->
            <div>
                <h2 class="text-xl font-bold mb-6 border-b border-zinc-800 pb-2 text-white flex items-center gap-2">🎵 Fragmentos Oficiales</h2>
                <div id="contenedor-canciones" class="flex flex-col gap-4"></div>
            </div>

            <!-- Adelantos -->
            <div>
                <h2 class="text-xl font-bold mb-6 border-b border-purple-800 pb-2 text-purple-400 flex items-center gap-2">🎬 Adelantos (1 Min)</h2>
                <div id="contenedor-previews" class="flex flex-col gap-4"></div>
            </div>
        </div>

    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let miUsuarioId = null;

        function mostrarPanel(panelId) {
            document.getElementById('panel-fragmento').classList.add('hidden');
            document.getElementById('panel-preview').classList.add('hidden');
            document.getElementById(panelId).classList.remove('hidden');
        }

        async function initPerfil() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            miUsuarioId = user.id;

            const { data: perfil } = await client.from('perfiles').select('*').eq('id', user.id).single();
            if (perfil) {
                document.getElementById('profile-name').textContent = perfil.nombre_display || "Sin Nombre";
                document.getElementById('profile-username').textContent = "@" + perfil.username;
                document.getElementById('profile-role').textContent = perfil.tipo || "Usuario";
                document.getElementById('profile-bio').textContent = perfil.bio || "Sin biografía.";
                if (perfil.avatar_url) document.getElementById('profile-avatar').innerHTML = `<img src="${perfil.avatar_url}" class="w-full h-full object-cover">`;
            }

            cargarLanzamientos();
            cargarPreviews();
        }

        // --- SISTEMA DE FRAGMENTOS (SPOTIFY) ---
        async function cargarLanzamientos() {
            const { data: canciones } = await client.from('canciones').select('*').eq('usuario_id', miUsuarioId).order('id', { ascending: false });
            const cont = document.getElementById('contenedor-canciones');
            if (canciones && canciones.length > 0) {
                cont.innerHTML = canciones.map(c => `<div class="mb-2 fade-in overflow-hidden rounded-xl">${c.enlace_embed}</div>`).join('');
            } else {
                cont.innerHTML = '<p class="text-zinc-600 text-sm">Sin fragmentos subidos.</p>';
            }
        }

        window.publicarCancion = async function() {
            const btn = document.getElementById('btn-subir-spotify');
            const titulo = document.getElementById('input-titulo-cancion').value.trim();
            const embed = document.getElementById('input-embed-cancion').value.trim();
            if(!titulo || !embed) return alert("Falta el título o el código.");

            btn.disabled = true; btn.textContent = "Publicando...";
            const { error } = await client.from('canciones').insert([{ usuario_id: miUsuarioId, titulo: titulo, enlace_embed: embed }]);
            
            btn.disabled = false; btn.textContent = "Publicar Fragmento";
            if (error) alert("Error: " + error.message);
            else {
                document.getElementById('input-titulo-cancion').value = '';
                document.getElementById('input-embed-cancion').value = '';
                cargarLanzamientos();
            }
        }

        // --- SISTEMA DE PREVIEWS DE VIDEO (MAX 1 MIN) ---
        window.validarVideo = function(input) {
            const file = input.files[0];
            const alerta = document.getElementById('alerta-video');
            const nombre = document.getElementById('nombre-archivo-video');
            alerta.classList.add('hidden');

            if (!file) return;

            // Validar si es video
            if (!file.type.startsWith('video/')) {
                alerta.textContent = "Por favor, elige un archivo de video (MP4).";
                alerta.classList.remove('hidden');
                input.value = ''; nombre.textContent = "Toca para elegir un video (MP4)"; return;
            }

            // Magia: Validar duración
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.onloadedmetadata = function() {
                window.URL.revokeObjectURL(video.src);
                // Le damos 62 segundos de margen por si la edición no fue exacta al milisegundo
                if (video.duration > 62) {
                    alerta.textContent = `¡El video dura ${Math.round(video.duration)} segundos! El máximo permitido es 1 minuto (60s). Recórtalo e intenta de nuevo.`;
                    alerta.classList.remove('hidden');
                    input.value = ''; nombre.textContent = "Toca para elegir un video (MP4)";
                } else {
                    nombre.textContent = `✅ Listo: ${file.name} (${Math.round(video.duration)}s)`;
                    nombre.classList.add('text-green-400');
                }
            }
            video.src = URL.createObjectURL(file);
        }

        async function cargarPreviews() {
            const { data: previews } = await client.from('previews').select('*').eq('usuario_id', miUsuarioId).order('fecha', { ascending: false });
            const cont = document.getElementById('contenedor-previews');
            if (!previews || previews.length === 0) {
                cont.innerHTML = '<p class="text-zinc-600 text-sm">Sin adelantos exclusivos.</p>';
                return;
            }

            cont.innerHTML = previews.map(p => `
                <div class="bg-zinc-900 border border-purple-800/50 p-4 rounded-xl shadow-lg fade-in">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-white">${p.titulo}</h3>
                        <span class="text-[9px] font-black bg-purple-600 text-white px-2 py-0.5 rounded uppercase">1 Min Max</span>
                    </div>
                    <video controls class="w-full rounded-lg bg-black outline-none border border-zinc-800" preload="metadata">
                        <source src="${p.url_media}" type="video/mp4">
                    </video>
                </div>
            `).join('');
        }

        window.publicarPreview = async function() {
            const btn = document.getElementById('btn-subir-video');
            const titulo = document.getElementById('input-titulo-preview').value.trim();
            const fileInput = document.getElementById('input-file-preview');
            const alerta = document.getElementById('alerta-video');

            if(!titulo || !fileInput.files[0]) {
                alerta.textContent = "Falta el título o seleccionar el video.";
                alerta.classList.remove('hidden'); return;
            }

            const file = fileInput.files[0];
            btn.disabled = true; btn.textContent = "Subiendo video (Esto puede tardar)...";

            // 1. Subir archivo al bucket
            const fileExt = file.name.split('.').pop();
            const filePath = `${miUsuarioId}-${Date.now()}.${fileExt}`;
            const { error: uploadError } = await client.storage.from('previews').upload(filePath, file);

            if (uploadError) {
                btn.disabled = false; btn.textContent = "Subir Preview";
                alerta.textContent = "Error al subir video: " + uploadError.message; alerta.classList.remove('hidden'); return;
            }

            // 2. Obtener URL y guardar en tabla
            const { data: { publicUrl } } = client.storage.from('previews').getPublicUrl(filePath);
            const { error: dbError } = await client.from('previews').insert([{ usuario_id: miUsuarioId, titulo: titulo, url_media: publicUrl }]);

            btn.disabled = false; btn.textContent = "Subir Preview";
            if (dbError) {
                alerta.textContent = "Error en base de datos: " + dbError.message; alerta.classList.remove('hidden');
            } else {
                document.getElementById('input-titulo-preview').value = '';
                fileInput.value = '';
                document.getElementById('nombre-archivo-video').textContent = "Toca para elegir un video (MP4)";
                document.getElementById('nombre-archivo-video').classList.remove('text-green-400');
                alerta.classList.add('hidden');
                cargarPreviews();
            }
        }

        window.cerrarSesion = async function() {
            await client.auth.signOut();
            window.location.href = 'index.html';
        }

        initPerfil();
    </script>
</body>
</html>
