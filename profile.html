<script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let miUsuarioId = null;

        async function initPerfil() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            miUsuarioId = user.id;

            // 1. Cargar Datos Básicos
            const { data: perfil } = await client.from('perfiles').select('*').eq('id', user.id).single();
            if (perfil) {
                document.getElementById('profile-name').textContent = perfil.nombre_display || "Sin Nombre";
                document.getElementById('profile-username').textContent = "@" + perfil.username;
                document.getElementById('profile-role').textContent = perfil.tipo || "Usuario";
                document.getElementById('profile-bio').textContent = perfil.bio || "Aún no hay biografía configurada.";
                
                if (perfil.avatar_url) {
                    document.getElementById('profile-avatar').innerHTML = `<img src="${perfil.avatar_url}" class="w-full h-full object-cover">`;
                } else {
                    document.getElementById('profile-avatar').innerHTML = `👤`;
                }
            }

            // 2. Cargar Música
            cargarLanzamientos();
            cargarPreviews();
        }

        // --- SISTEMA DE LANZAMIENTOS (SPOTIFY) ---
        async function cargarLanzamientos() {
            // AHORA BUSCAMOS POR usuario_id
            const { data: canciones } = await client.from('canciones').select('*').eq('usuario_id', miUsuarioId).order('id', { ascending: false });
            const cont = document.getElementById('contenedor-canciones');
            
            if (canciones && canciones.length > 0) {
                cont.innerHTML = canciones.map(c => `<div class="mb-2 fade-in">${c.enlace_embed}</div>`).join('');
            } else {
                cont.innerHTML = '<p class="text-zinc-500 text-sm">No has subido ningún lanzamiento oficial aún.</p>';
            }
        }

        window.publicarCancion = async function() {
            const titulo = document.getElementById('input-titulo-cancion').value.trim();
            const embed = document.getElementById('input-embed-cancion').value.trim();
            if(!titulo || !embed) return alert("Falta el título o el código embed.");

            // AHORA GUARDAMOS CON usuario_id
            const { error } = await client.from('canciones').insert([{ usuario_id: miUsuarioId, titulo: titulo, enlace_embed: embed }]);
            if (error) alert("Error: " + error.message);
            else {
                document.getElementById('input-titulo-cancion').value = '';
                document.getElementById('input-embed-cancion').value = '';
                cargarLanzamientos();
            }
        }

        // --- SISTEMA DE ADELANTOS EXCLUSIVOS ---
        async function cargarPreviews() {
            // AHORA BUSCAMOS POR usuario_id
            const { data: previews } = await client.from('previews').select('*').eq('usuario_id', miUsuarioId).order('fecha', { ascending: false });
            const cont = document.getElementById('contenedor-previews');
            
            if (!previews || previews.length === 0) {
                cont.innerHTML = '<p class="text-zinc-500 text-sm">Aún no hay material inédito publicado.</p>';
                return;
            }

            cont.innerHTML = previews.map(p => {
                const esVideo = p.url_media.toLowerCase().includes('.mp4');
                const mediaHTML = esVideo
                    ? `<video controls class="w-full rounded-lg border border-zinc-700 mt-2 bg-black"><source src="${p.url_media}" type="video/mp4"></video>`
                    : `<audio controls class="w-full mt-2"><source src="${p.url_media}"></audio>`;
                
                return `
                <div class="bg-zinc-900 border border-purple-800 p-5 rounded-lg flex flex-col relative shadow-xl fade-in">
                    <div class="absolute top-0 left-0 w-1 h-full bg-purple-600"></div>
                    <div class="ml-2 w-full overflow-hidden">
                        <span class="text-[10px] font-black bg-purple-600 text-white px-2 py-1 rounded uppercase tracking-widest">Adelanto Exclusivo</span>
                        <h3 class="text-lg font-black text-white mt-3 mb-1">${p.titulo}</h3>
                        ${mediaHTML}
                    </div>
                </div>`;
            }).join('');
        }

        window.publicarPreview = async function() {
            const titulo = document.getElementById('input-titulo-preview').value.trim();
            const url = document.getElementById('input-url-preview').value.trim();
            if(!titulo || !url) return alert("Falta el título o el enlace del archivo.");

            // AHORA GUARDAMOS CON usuario_id
            const { error } = await client.from('previews').insert([{ usuario_id: miUsuarioId, titulo: titulo, url_media: url }]);
            if (error) alert("Error: " + error.message);
            else {
                document.getElementById('input-titulo-preview').value = '';
                document.getElementById('input-url-preview').value = '';
                cargarPreviews(); 
            }
        }

        window.cerrarSesion = async function() {
            await client.auth.signOut();
            window.location.href = 'index.html';
        }

        initPerfil();
    </script>
